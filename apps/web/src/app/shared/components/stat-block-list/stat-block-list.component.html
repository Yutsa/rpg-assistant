<div class="stat-block-list" data-testid="stat-block-list">
  <mat-nav-list aria-label="Fiches stat block">
    @for (block of statBlocks(); track block.chunk_id) {
      <a
        mat-list-item
        class="stat-block-item"
        [class.selected]="selectedChunkId() === block.chunk_id"
        [attr.data-testid]="'stat-block-item-' + block.chunk_id"
        (click)="statBlockSelected.emit(block.chunk_id)"
        (keydown.enter)="statBlockSelected.emit(block.chunk_id)"
        tabindex="0"
      >
        <span matListItemTitle>{{ block.name }}</span>
        <span matListItemLine class="meta">
          @if (block.uses_rulebook) {
            <span class="rulebook-badge" data-testid="stat-block-rulebook-badge">Livre de règles</span>
          } @else if (block.nc != null) {
            <span>NC {{ block.nc }}</span>
          }
        </span>
        <span matListItemMeta>
          <app-page-range-badge
            [pageStart]="block.pages.start"
            [pageEnd]="block.pages.end"
            [actionable]="true"
            (pageClick)="openPdfAtPage(block.chunk_id, block.pages.start)"
          />
        </span>
      </a>
    }
  </mat-nav-list>
</div>
