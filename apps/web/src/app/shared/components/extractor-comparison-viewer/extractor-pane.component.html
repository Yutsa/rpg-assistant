<section class="pane">
  <header class="pane-header">
    <h3>{{ title() }}</h3>
    <p>{{ subtitle() }} · {{ blocks().length }} blocs</p>
  </header>

  <div
    class="canvas-wrap"
    #canvasWrap
    [class.canvas-wrap--scrollable]="allowScroll()"
  >
    <div class="canvas">
      <img
        class="page-image"
        [src]="renderUrl()"
        [attr.alt]="title()"
        [style.width.px]="displayWidth() > 0 ? displayWidth() : null"
        (load)="onImageLoad($event)"
      />
      @if (displayWidth() > 0 && displayHeight() > 0) {
        <svg
          class="overlay"
          [style.width.px]="displayWidth()"
          [style.height.px]="displayHeight()"
          [attr.viewBox]="'0 0 ' + displayWidth() + ' ' + displayHeight()"
        >
          @for (block of overlayBlocks(); track block.id) {
            <rect
              [attr.x]="block.screenX"
              [attr.y]="block.screenY"
              [attr.width]="block.screenWidth"
              [attr.height]="block.screenHeight"
              [attr.stroke]="strokeColor()"
              class="block-rect"
              [class.is-hovered]="hoveredBlockId() === block.id"
              [class.is-selected]="selectedBlockId() === block.id"
              [class.is-matched]="matchedBlockId() === block.id"
              [matTooltip]="blockTooltip(block)"
              (mouseenter)="onBlockHover(block)"
              (mouseleave)="onBlockHover(null)"
              (click)="onBlockClick(block)"
            />
          }
        </svg>
      }
    </div>
  </div>
</section>
