<section class="pane">
  <header class="pane-header">
    <h3>{{ title() }}</h3>
    <p>{{ subtitle() }} · {{ blocks().length }} blocs</p>
  </header>

  <div class="canvas-wrap" #canvasWrap>
    @if (displayWidth() > 0 && displayHeight() > 0) {
      <div
        class="canvas"
        [style.width.px]="displayWidth()"
        [style.height.px]="displayHeight()"
        [style.background-image]="'url(' + renderUrl() + ')'"
      >
        <svg
          class="overlay"
          [style.width.px]="displayWidth()"
          [style.height.px]="displayHeight()"
          [attr.viewBox]="'0 0 ' + displayWidth() + ' ' + displayHeight()"
        >
          @for (block of overlayBlocks(); track block.id) {
            <rect
              [attr.x]="block.screenX"
              [attr.y]="block.screenY"
              [attr.width]="block.screenWidth"
              [attr.height]="block.screenHeight"
              [attr.stroke]="strokeColor()"
              fill="transparent"
              stroke-width="1.5"
            >
              <title>{{ block.text }}</title>
            </rect>
          }
        </svg>
      </div>
    }
  </div>
</section>
