services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: rpg
      POSTGRES_DB: rpg_assistant
    ports:
      - "5432:5432"
    volumes:
      - rpg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg -d rpg_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rpg_pgdata:
